<script>
document.addEventListener("DOMContentLoaded", function () {

  function formatTime(date) {
    return date.toLocaleTimeString("en-IN", { hour: "numeric", minute: "2-digit", hour12: true });
  }

  function showImage(frame) {
    const img = document.createElement("img");
    img.src = "cover.png";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "cover";
    frame.innerHTML = "";
    frame.appendChild(img);
  }

  // 🎵 BACKGROUND MUSIC (safe for mobile)
  let bgAudio;
  function initBackgroundMusic() {
    bgAudio = new Audio("bts.mp3"); // 🔁 add your file
    bgAudio.loop = true;
    bgAudio.volume = 0.4;

    const startMusic = () => {
      bgAudio.play().catch(()=>{});
      document.removeEventListener("click", startMusic);
      document.removeEventListener("touchstart", startMusic);
    };

    document.addEventListener("click", startMusic);
    document.addEventListener("touchstart", startMusic);
  }

  // 🔊 SCAN SOUND
  let scanAudioCtx, scanOsc, scanGain;

  function startScanSound() {
    try {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      scanAudioCtx = new AudioCtx();
      scanOsc = scanAudioCtx.createOscillator();
      scanGain = scanAudioCtx.createGain();

      scanOsc.frequency.value = 220;
      scanGain.gain.value = 0.05;

      scanOsc.connect(scanGain);
      scanGain.connect(scanAudioCtx.destination);
      scanOsc.start();
    } catch(e){}
  }

  function stopScanSound() {
    try {
      if(scanOsc) scanOsc.stop();
      if(scanAudioCtx) scanAudioCtx.close();
    } catch(e){}
  }

  // 🎉 CONFETTI
  function launchConfetti() {
    for (let i = 0; i < 60; i++) {
      const conf = document.createElement("div");
      conf.style.position = "fixed";
      conf.style.width = "6px";
      conf.style.height = "6px";
      conf.style.background = ["#00ff99","#7B3FE4","#ffffff","#ff4d4d"][Math.floor(Math.random()*4)];
      conf.style.top = "50%";
      conf.style.left = "50%";
      conf.style.zIndex = "9999";

      document.body.appendChild(conf);

      const x = (Math.random() - 0.5) * 600;
      const y = (Math.random() - 0.5) * 600;

      conf.animate([
        { transform: "translate(0,0)", opacity: 1 },
        { transform: `translate(${x}px, ${y}px)`, opacity: 0 }
      ], {
        duration: 1000,
        easing: "ease-out"
      });

      setTimeout(() => conf.remove(), 1000);
    }
  }

  function showSecurityAlert() {
    const overlay = document.createElement("div");
    overlay.innerText = "SECURITY ALERT";
    Object.assign(overlay.style, {
      position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
      fontSize: "26px", fontWeight: "bold", color: "#ff4d4d",
      background: "rgba(0,0,0,0.9)", padding: "20px 30px",
      border: "2px solid #ff4d4d", borderRadius: "8px", zIndex: "9999"
    });
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 1200);
  }

  function showAccessGranted(name) {
    const overlay = document.createElement("div");
    overlay.innerText = "ACCESS GRANTED\nARMY VERIFIED 💜";
    Object.assign(overlay.style, {
      position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
      fontSize: "24px", fontWeight: "bold", color: "#00ff99",
      background: "rgba(0,0,0,0.85)", padding: "20px 30px",
      border: "2px solid #00ff99", borderRadius: "8px",
      zIndex: "9999", textAlign: "center"
    });
    document.body.appendChild(overlay);
    setTimeout(() => overlay.remove(), 1500);
  }

  // 💥 SHAKE
  function triggerShake() {
    document.body.style.animation = "shake 0.4s";
    setTimeout(() => document.body.style.animation = "", 400);
  }

  function updateStatus() {
    const main = document.getElementById("mainText");
    const sub = document.getElementById("subText");
    const details = document.getElementById("details");
    const frame = document.getElementById("frame");

    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("id") || "UNKNOWN";
    const validTickets = ["ARI-78291","ARI-78292"];
    const now = new Date();

    const eventStart = new Date("2026-03-21T16:30:00+05:30");
    const eventEnd = new Date("2026-03-21T17:30:00+05:30");

    if(!validTickets.includes(ticketId)) {
      main.innerText = "INVALID TICKET";
      sub.innerText = "Please check your pass";
      showSecurityAlert();
      return;
    }

    const name = params.get("name") || "BTS ARMY";

    // 🎯 DURING EVENT ONLY (for demo simplicity)
    if(now >= eventStart && now <= eventEnd) {

      const scanLine = document.getElementById("scanLine");

      scanLine.style.top = "0px";
      scanLine.style.opacity = "1";

      let pos = 0;
      const frameHeight = frame.clientHeight;

      startScanSound();

      const interval = setInterval(() => {
        pos += 2;
        scanLine.style.top = pos + "px";
        scanLine.style.opacity = 0.7 + 0.3 * Math.sin(pos / 6);

        if(pos >= frameHeight) {
          clearInterval(interval);
          stopScanSound();

          setTimeout(() => {
            showImage(frame);

            main.innerText = "ENTRY CONFIRMED";
            sub.innerText = "Welcome " + name;

            frame.classList.add("success-pulse");

            triggerShake();
            showAccessGranted(name);
            launchConfetti();

            details.style.display = "block";
          }, 400);
        }

      }, 16);
    }
  }

  initBackgroundMusic(); // 🎵 init music
  setTimeout(updateStatus, 500);
});
</script>
